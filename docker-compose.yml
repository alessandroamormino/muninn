services:
  vector-db:
    # Weaviate vector database — start with: docker compose --profile weaviate up
    image: semitechnologies/weaviate:1.27.2
    container_name: vector-db
    profiles: [weaviate]
    ports:
      - "8080:8080"    # HTTP API
      - "50051:50051"  # gRPC API
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  vector-db-qdrant:
    # Qdrant vector database — start with: docker compose --profile qdrant up
    # Dashboard available at http://localhost:6333/dashboard (built-in, no extra container)
    image: qdrant/qdrant:latest
    container_name: vector-db-qdrant
    profiles: [qdrant]
    ports:
      - "6333:6333"   # REST API + dashboard at /dashboard
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # Qdrant image does not include curl — use bash TCP socket check (PITFALL 3)
      test: ["CMD", "bash", "-c", ":> /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  orchestrator:
    build:
      context: ./sync-service
      dockerfile: Dockerfile
    container_name: orchestrator
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Ollama runs natively on the host — accessible via host.docker.internal.
      # On Linux (prod/CI), override with: OLLAMA_ENDPOINT=http://embedder:11434
      OLLAMA_ENDPOINT: "${OLLAMA_ENDPOINT:-http://host.docker.internal:11434}"
    volumes:
      - ./configuration:/app/configuration:rw
      - ./data:/app/data:rw
      - sync_data:/app/.sync
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      vector-db:
        condition: service_healthy
        required: false
      vector-db-qdrant:
        condition: service_healthy
        required: false
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped

  weaviate-ui:
    image: naaive/weaviate-ui:latest
    container_name: weaviate-ui
    profiles: [weaviate]
    ports:
      - "7777:7777"
    environment:
      WEAVIATE_URL: "http://vector-db:8080"
    depends_on:
      - vector-db
    restart: unless-stopped

volumes:
  weaviate_data:
    driver: local
  qdrant_data:
    driver: local
  sync_data:
    driver: local
