api:
  default_limit: 10
  max_limit: 100
  output_fields:
  - brand
  - categoria
  - codice_prodotto
  - ean
  - prezzo_listino_eur
  - disponibilita_magazzino
  - fornitore
  - paese_origine
  - data_creazione
  - descrizione
  - protezione_ip
  - materiale
  - colore
  - specifiche_tecniche
embedding:
  endpoint: http://host.docker.internal:11434
  model: bge-m3
  type: ollama
source:
  delimiter: ','
  file_path: ./data/prodotti_fake.csv
  id_field: id_prodotto
  type: csv
sync:
  hash_fields:
  - id_prodotto
  mode: full
  schedule: manual
weaviate:
  collection: ProdottiFake
  quantization: pq   # Product Quantization: ~32x RAM reduction (~350MB vs ~10GB), ~2-5% quality loss
  metadata_fields:
  - brand
  - categoria
  - codice_prodotto
  - ean
  - prezzo_listino_eur
  - disponibilita_magazzino
  - fornitore
  - paese_origine
  - data_creazione
  text_fields:
  - descrizione
  - specifiche_tecniche
  - protezione_ip
  - materiale
  - colore
