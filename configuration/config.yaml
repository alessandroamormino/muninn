source:
  type: rest_api
  url: https://api.themoviedb.org/3/movie/popular
  id_field: id
  json_key: results
  auth:
    type: bearer
    token: ${TMDB_BEARER_TOKEN}
  params:
    language: en-US
  pagination:
    type: page
    page_param: page
    total_pages_key: total_pages
    start_page: 1
    max_pages: 500       # 500 × 20 = 10.000 film (hard cap TMDB)

embedding:
  type: ollama
  model: qwen3-embedding:4b
  endpoint: http://host.docker.internal:11434

weaviate:
  collection: Movies
  text_fields:
    - title
    - overview
  metadata_fields:
    - release_date
    - vote_average
    - original_language
    - popularity

sync:
  mode: incremental
  hash_fields:
    - id
    - title
    - overview
  schedule: manual

api:
  output_fields:
    - title
    - overview
    - release_date
    - vote_average
    - original_language
    - popularity
  default_limit: 10
  max_limit: 100
