server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Increase max body size for CSV uploads (matches POST /upload 500 MB cap)
  client_max_body_size 512M;

  # Proxy /api/* to orchestrator — TRAILING SLASH strips /api/ prefix.
  # Without the trailing slash, /api/search → orchestrator:8000/api/search → 404.
  location /api/ {
    proxy_pass http://orchestrator:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }

  # SPA catch-all: serve index.html for all non-file routes (React Router).
  location / {
    try_files $uri $uri/ /index.html;
  }
}
